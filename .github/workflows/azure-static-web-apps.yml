name: Azure Static Web Apps CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: swa-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build${{ github.event_name == 'push' && ' and Deploy' || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            api/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build frontend
        env:
          VITE_SPOTIFY_CLIENT_ID: ${{ vars.VITE_SPOTIFY_CLIENT_ID }}
          VITE_APPINSIGHTS_CLOUD_ROLE_NAME: ${{ vars.VITE_APPINSIGHTS_CLOUD_ROLE_NAME }}
          VITE_APP_ENVIRONMENT: ${{ vars.VITE_APP_ENVIRONMENT }}
          VITE_APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.VITE_APPLICATIONINSIGHTS_CONNECTION_STRING }}
          VITE_APP_VERSION: ${{ github.ref_name }}-${{ github.run_number }}
          VITE_BUILD_SHA: ${{ github.sha }}
        run: npm run build

      - name: Copy SWA config into build output
        run: cp staticwebapp.config.json dist/staticwebapp.config.json

      - name: Install API dependencies
        working-directory: api
        run: npm ci

      - name: Build API
        working-directory: api
        run: npm run build

      - name: Prune API dev dependencies
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: api
        run: npm prune --omit=dev

      - name: Deploy to Azure Static Web Apps
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: 'dist'
          api_location: 'api'
          output_location: ''
          skip_app_build: true
          skip_api_build: true
          production_branch: main
