<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="DJ Set to Spotify Playlist">
  <defs>
    <radialGradient id="disc" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="label" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a35cff"/>
      <stop offset="100%" stop-color="#7028e6"/>
    </radialGradient>
    <linearGradient id="play" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1ed760"/>
      <stop offset="100%" stop-color="#179a45"/>
    </linearGradient>
  </defs>

  <circle cx="256" cy="256" r="248" fill="url(#disc)"/>

  <g fill="none" stroke="#2e2e2e" stroke-width="1.6">
    <circle cx="256" cy="256" r="232"/>
    <circle cx="256" cy="256" r="218"/>
    <circle cx="256" cy="256" r="204"/>
    <circle cx="256" cy="256" r="190"/>
    <circle cx="256" cy="256" r="176"/>
    <circle cx="256" cy="256" r="162"/>
    <circle cx="256" cy="256" r="148"/>
  </g>

  <ellipse cx="170" cy="148" rx="130" ry="46" fill="#ffffff" opacity="0.07" transform="rotate(-25 170 148)"/>

  <circle cx="256" cy="256" r="128" fill="url(#label)"/>
  <circle cx="256" cy="256" r="128" fill="none" stroke="#5a1de0" stroke-width="2.5"/>

  <path d="M 220 192 L 220 320 L 336 256 Z"
        fill="url(#play)"
        stroke="#1ed760"
        stroke-linejoin="round"
        stroke-linecap="round"
        stroke-width="6"/>
</svg>
